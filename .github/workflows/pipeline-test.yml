name: Pipeline Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pipeline-test:
    name: Run pipeline test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run pipeline test
        run: node tests/pipeline-test.mjs

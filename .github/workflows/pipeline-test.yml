name: Pipeline Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pipeline-test:
    name: Run pipeline test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline test
        run: node tests/pipeline-test.mjs

      - name: Run blog index drift test
        run: node tests/blog-index-sync-test.mjs

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royaltē Executive Brief™ v4</title>
<style>

/* ═══════════════════════════════════════════════════════════════════════════
   ROYALTĒ V4 DESIGN TOKENS
   Constitutional authority: V4 palette wins over mockup colors.
   No blue / cyan / teal / orange / neon.
   ═══════════════════════════════════════════════════════════════════════════ */

:root {
  /* Backgrounds */
  --bg-white:       #FFFFFF;
  --bg-light:       #F8F7FC;    /* soft off-white page bg */
  --bg-dark:        #0B0B14;    /* near-black (cover left panel) */
  --bg-dark-mid:    #13121F;    /* slightly lighter dark surface */
  --bg-lavender:    #EDE9FE;    /* pale violet surface / tag bg */

  /* Brand */
  --purple:         #6B32A0;    /* Royaltē primary purple */
  --purple-light:   #8E52C0;    /* hover / accent purple */
  --purple-pale:    #C4A8E8;    /* muted purple for dark-surface text */

  /* Text */
  --text-dark:      #111827;    /* near-black body text */
  --text-mid:       #374151;    /* secondary body text */
  --text-light:     #6B7280;    /* captions, labels */
  --text-xlight:    #9CA3AF;    /* tertiary / placeholders */
  --text-white:     #FFFFFF;
  --text-on-dark:   #E5E7EB;    /* readable text on --bg-dark */

  /* Semantic status */
  --green-bg:       #D1FAE5;
  --green-text:     #065F46;
  --amber-bg:       #FEF3C7;
  --amber-text:     #92400E;
  --red-bg:         #FEE2E2;
  --red-text:       #991B1B;
  --gray-bg:        #F3F4F6;
  --gray-text:      #374151;

  /* Champagne (premium accent) */
  --champagne:      #F5E6C8;
  --champagne-text: #78532A;

  /* Borders */
  --border:         #E5E7EB;
  --border-mid:     #D1D5DB;

  /* Score bar */
  --bar-track:      #E5E7EB;
  --bar-fill:       #6B32A0;

  /* Typography */
  --font:           'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:      'IBM Plex Mono', 'Fira Mono', monospace;
}

/* ═══════════════════════════════════════════════════════════════════════════
   PRINT / PDFSHIFT CONFORMANCE
   PDFShift is called with: { source: html, use_print: true, format: 'Letter' }
   Every .page must be exactly 8.5in × 11in with overflow hidden.
   ═══════════════════════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font);
  font-size: 10pt;
  background: var(--bg-white);
  color: var(--text-dark);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

@page {
  size: letter;
  margin: 0;
}

.page {
  width: 8.5in;
  height: 11in;
  overflow: hidden;
  position: relative;
  page-break-after: always;
  break-after: page;
  background: var(--bg-white);
}

.page:last-child {
  page-break-after: avoid;
  break-after: avoid;
}

/* ═══════════════════════════════════════════════════════════════════════════
   PLACEHOLDER — filled with page content in subsequent steps
   ═══════════════════════════════════════════════════════════════════════════ */

.page-scaffold-label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 13pt;
  font-weight: 700;
  color: var(--text-xlight);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  pointer-events: none;
}

</style>
</head>

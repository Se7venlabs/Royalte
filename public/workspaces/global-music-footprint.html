<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Global Music Footprint™ — Royaltē OS</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/royalte-workspace.css">
</head>
<body>
<div class="ws-shell">

  <header class="ws-topbar">
    <a class="ws-topbar-back" href="/mission-control.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Mission Control
    </a>
    <div class="ws-topbar-brand">Royaltē OS™</div>
  </header>

  <div class="ws-hero">
    <div class="ws-hero-inner">
      <div class="ws-hero-mark ws-hero-mark--footprint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
      </div>
      <div class="ws-hero-text">
        <h1 class="ws-hero-title">Global Music Footprint™</h1>
        <p class="ws-hero-desc">Worldwide distribution presence and territorial coverage — where your music exists and how broadly Royaltē is monitoring it.</p>
      </div>
    </div>
  </div>

  <main class="ws-main">
    <div class="ws-module-wrap ws-module-wrap--wide">

      <article class="mc-card mc-card--footprint" id="global-footprint" aria-label="Global Music Footprint">
        <div class="mc-card-head">
          <div class="mc-card-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          </div>
          <div class="mc-card-title">GLOBAL MUSIC FOOTPRINT™</div>
        </div>

        <div class="mc-globe" aria-hidden="true">
          <img class="mc-globe-map" src="/img/mission-control-world-map.png" alt="">
          <span class="mc-globe-marker" style="left:27%; top:27%; animation-delay:1.51s;"></span>
          <span class="mc-globe-marker" style="left:16%; top:33%; animation-delay:0.90s;"></span>
          <span class="mc-globe-marker" style="left:31%; top:30%; animation-delay:1.74s;"></span>
          <span class="mc-globe-marker" style="left:22%; top:40%; animation-delay:1.23s;"></span>
          <span class="mc-globe-marker" style="left:27%; top:65%; animation-delay:1.51s;"></span>
          <span class="mc-globe-marker" style="left:49%; top:21%; animation-delay:2.74s;"></span>
          <span class="mc-globe-marker" style="left:55%; top:22%; animation-delay:3.08s;"></span>
          <span class="mc-globe-marker" style="left:48%; top:29%; animation-delay:2.69s;"></span>
          <span class="mc-globe-marker" style="left:51%; top:48%; animation-delay:2.86s;"></span>
          <span class="mc-globe-marker" style="left:55%; top:66%; animation-delay:3.08s;"></span>
          <span class="mc-globe-marker" style="left:64%; top:38%; animation-delay:3.58s;"></span>
          <span class="mc-globe-marker" style="left:71%; top:38%; animation-delay:3.98s;"></span>
          <span class="mc-globe-marker" style="left:80%; top:30%; animation-delay:4.48s;"></span>
          <span class="mc-globe-marker" style="left:88%; top:32%; animation-delay:4.93s;"></span>
          <span class="mc-globe-marker" style="left:86%; top:84%; animation-delay:4.82s;"></span>
          <div class="mc-globe-sweep" aria-hidden="true"></div>
        </div>

        <div class="mc-foot-footer">
          <div class="mc-globe-status" aria-label="Royaltē Live — scanning global distribution">
            <span class="mc-globe-status-dot" aria-hidden="true"></span>
            <span class="mc-globe-status-text">
              <span class="mc-globe-status-title">Royaltē Live™</span>
              <span class="mc-globe-status-sub">Scanning Global Distribution</span>
            </span>
          </div>
          <div class="mc-globe-territories" aria-label="Territories verified by Royaltē Global Distribution">
            <span class="mc-globe-territories-label">
              <svg class="mc-globe-territories-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
              Territories Verified™
            </span>
            <span class="mc-globe-territories-count">0</span>
          </div>
        </div>
      </article>

    </div>
    <div class="ws-expansion"></div>
  </main>

</div>
</body>
</html>
